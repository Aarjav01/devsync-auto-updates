name: DevSync Daily Update

on:
  # 1. The Alarm Clock: Run every day at 10:30 AM UTC
  schedule:
    - cron: '30 10 * * *'
  
  # 2. The Manual Override: Lets you test it right now without waiting 24 hours!
  workflow_dispatch:

jobs:
  daily-commit-job:
    runs-on: ubuntu-latest
    
    # 3. Security Badge: Give the robot permission to modify your code
    permissions:
      contents: write

    steps:
      # Step A: Tell the robot to download your current code
      - name: Checkout the repository
        uses: actions/checkout@v4

      # Step B: Make a tiny change so there is something to commit
      - name: Update the daily log file
        run: |
          echo "Automated update ran on $(date)" >> activity_log.txt

      # Step C: The assignment requirement! Commit the code with your email in the step name.
      - name: Commit changes for 23f1001127@ds.study.iitm.ac.in
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add activity_log.txt
          git commit -m "Automated daily activity update"
          git push
